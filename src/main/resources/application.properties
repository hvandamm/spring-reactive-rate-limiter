spring.application.name=demo2

# Redis Configuration
spring.data.redis.host=127.0.0.1
spring.data.redis.port=6379
spring.data.redis.timeout=2000ms
spring.data.redis.lettuce.pool.max-active=16
spring.data.redis.lettuce.pool.max-idle=8
spring.data.redis.lettuce.pool.min-idle=2

# ─────────────────────────────────────────────────────────
# Rate Limiter Tier Security Configuration
# ─────────────────────────────────────────────────────────
# Free Tier
app.security.tiers.free.key=${FREE_API_KEY:free-key-123}
app.security.tiers.free.capacity=10
app.security.tiers.free.refill-rate=2

# Premium Tier
app.security.tiers.premium.key=${PREMIUM_API_KEY:premium-key-456}
app.security.tiers.premium.capacity=100
app.security.tiers.premium.refill-rate=20